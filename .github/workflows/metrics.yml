name: Metrics

on:
  schedule: [{ cron: "0 0 * * *" }]
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: EduardoCornejo
          template: classic
          filename: github-metrics.svg

          base: header

          # Streak + commits/day
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: no
          config_timezone: America/Mexico_City

          # Contributions calendar 3D/isometric
          plugin_calendar: yes
          plugin_calendar_limit: 0
